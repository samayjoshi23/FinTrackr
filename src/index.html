<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <title>Fintrackr</title>
    <base href="/" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <link rel="icon" type="image/x-icon" href="favicon.ico" />
    <link rel="manifest" href="manifest.webmanifest" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  </head>
  <body class="theme-light">
    <svg xmlns="http://www.w3.org/2000/svg" style="display: none">

      <symbol id="envelope" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor">

          d="M21.75 6.75v10.5a2.25 2.25 0 0 1-2.25 2.25h-15a2.25 2.25 0 0 1-2.25-2.25V6.75m19.5 0A2.25 2.25 0 0 0 19.5 4.5h-15a2.25 2.25 0 0 0-2.25 2.25m19.5 0v.243a2.25 2.25 0 0 1-1.07 1.916l-7.5 4.615a2.25 2.25 0 0 1-2.36 0L3.32 8.91a2.25 2.25 0 0 1-1.07-1.916V6.75"
        />
      </symbol>

      <!-- Lock -->
      <symbol id="lock" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor">
        <path
          stroke-linecap="round"
          stroke-linejoin="round"
          d="M16.5 10.5V6.75a4.5 4.5 0 1 0-9 0v3.75m-.75 11.25h10.5a2.25 2.25 0 0 0 2.25-2.25v-6.75a2.25 2.25 0 0 0-2.25-2.25H6.75a2.25 2.25 0 0 0-2.25 2.25v6.75a2.25 2.25 0 0 0 2.25 2.25Z"
        />
      </symbol>

      <!-- Eye open -->
      <symbol id="eye-open" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor">
        <path
          stroke-linecap="round"
          stroke-linejoin="round"
          d="M2.036 12.322a1.012 1.012 0 0 1 0-.639C3.423 7.51 7.36 4.5 12 4.5c4.638 0 8.573 3.007 9.963 7.178.07.207.07.431 0 .639C20.577 16.49 16.64 19.5 12 19.5c-4.638 0-8.573-3.007-9.963-7.178Z"
        />
        <path
          stroke-linecap="round"
          stroke-linejoin="round"
          d="M15 12a3 3 0 1 1-6 0 3 3 0 0 1 6 0Z"
        />
      </symbol>

      <!-- Eye closed -->
      <symbol id="eye-closed" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor">
        <path
          stroke-linecap="round"
          stroke-linejoin="round"
          d="M3.98 8.223A10.477 10.477 0 0 0 1.934 12C3.226 16.338 7.244 19.5 12 19.5c.993 0 1.953-.138 2.863-.395M6.228 6.228A10.451 10.451 0 0 1 12 4.5c4.756 0 8.773 3.162 10.065 7.498a10.522 10.522 0 0 1-4.293 5.774M6.228 6.228 3 3m3.228 3.228 3.65 3.65m7.894 7.894L21 21m-3.228-3.228-3.65-3.65m0 0a3 3 0 1 0-4.243-4.243m4.242 4.242L9.88 9.88"
        />
      </symbol>

      <!-- User -->
      <symbol id="user" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor">
        <path
          stroke-linecap="round"
          stroke-linejoin="round"
          d="M15.75 6a3.75 3.75 0 1 1-7.5 0 3.75 3.75 0 0 1 7.5 0ZM4.501 20.118a7.5 7.5 0 0 1 14.998 0A17.933 17.933 0 0 1 12 21.75c-2.676 0-5.216-.584-7.499-1.632Z"
        />
      </symbol>

      <!-- Home -->
      <symbol id="logout" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor">
        <path
          stroke-linecap="round"
          stroke-linejoin="round"
          d="m2.25 12 8.954-8.955c.44-.439 1.152-.439 1.591 0L21.75 12M4.5 9.75v10.125c0 .621.504 1.125 1.125 1.125H9.75v-4.875c0-.621.504-1.125 1.125-1.125h2.25c.621 0 1.125.504 1.125 1.125V21h4.125c.621 0 1.125-.504 1.125-1.125V9.75M8.25 21h8.25"
        />
      </symbol>

      <!-- Right-arrow -->
      <symbol id="right-arrow" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor">
        <path
          stroke-linecap="round"
          stroke-linejoin="round"
          d="M13.5 4.5 21 12m0 0-7.5 7.5M21 12H3"
        />
      </symbol>

      <!-- Left arrow -->
      <symbol id="left-arrow" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor">
        <path
          stroke-linecap="round"
          stroke-linejoin="round"
          d="M10.5 19.5 3 12m0 0 7.5-7.5M3 12h18"
        />
      </symbol>
    </svg>

    <app-root></app-root>
    <noscript>Please enable JavaScript to continue using this application.</noscript>

    <!-- Simple theme toggle (light / dark) -->
    <button
      id="theme-toggle"
      type="button"
      style="
        position: fixed;
        bottom: 1.5rem;
        right: 1.5rem;
        padding: 0.5rem 0.9rem;
        border-radius: 999px;
        border: 1px solid var(--color-border-strong, #d1d5db);
        background-color: var(--color-bg-elevated, #ffffff);
        color: var(--color-text, #111827);
        font-size: 0.85rem;
        display: inline-flex;
        align-items: center;
        gap: 0.4rem;
        cursor: pointer;
        box-shadow: 0 10px 15px rgba(15, 23, 42, 0.15);
        z-index: 50;
      "
    >
      <span id="theme-toggle-icon">🌞</span>
      <span id="theme-toggle-label">Light</span>
    </button>

    <script>
      (function () {
        var body = document.body;
        var button = document.getElementById('theme-toggle');
        var iconSpan = document.getElementById('theme-toggle-icon');
        var labelSpan = document.getElementById('theme-toggle-label');
        var THEME_KEY = 'fintrackr-theme';

        function applyTheme(theme) {
          if (theme === 'dark') {
            body.classList.add('theme-dark');
            iconSpan.textContent = '🌙';
            labelSpan.textContent = 'Dark';
          } else {
            body.classList.remove('theme-dark');
            iconSpan.textContent = '🌞';
            labelSpan.textContent = 'Light';
          }
        }

        var saved =
          (typeof localStorage !== 'undefined' && localStorage.getItem(THEME_KEY)) || 'light';
        applyTheme(saved);

        if (button) {
          button.addEventListener('click', function () {
            var current = body.classList.contains('theme-dark') ? 'dark' : 'light';
            var next = current === 'dark' ? 'light' : 'dark';
            applyTheme(next);
            if (typeof localStorage !== 'undefined') {
              localStorage.setItem(THEME_KEY, next);
            }
          });
        }
      })();
    </script>
  </body>
</html>
