<div class="flex items-center justify-between h-full w-full relative">
  @for (route of routes(); track route.path) {
    <div
      class="flex justify-center w-1/5 h-[3.5rem]"
      [class.text-primary]="route.selected"
      [class.text-secondary]="!route.selected"
    >
      <div
        class="flex items-center justify-between flex-col gap-1 cursor-pointer"
        (click)="onTabClick(route.path)"
      >
        <div class="h-1 w-10 rounded-b-full" [class.bg-primary]="route.selected"></div>
        <div class="flex items-center gap-1 flex-col mb-2">
          @if (route.icon) {
            <ico [name]="route.icon" size="md"></ico>
          }
          <p class="text-xs font-light" [class.font-semibold]="route.selected">{{ route.name }}</p>
        </div>
      </div>
    </div>
  }
  <div
    class="absolute bottom-0 left-[50%] translate-x-[-50%] left-0 cursor-pointer"
    (click)="onTabClick('/user/transactions/add')"
  >
    <div class="h-12 w-12 bg-primary rounded-full flex items-center justify-center">
      <ico [name]="'plus-circle'" size="lg" class="text-[var(--color-bg-elevated)]"></ico>
    </div>
  </div>
</div>
