<app-modal [(open)]="open" [closable]="true" [closeOnBackdrop]="true" [bodyTemplate]="promptTpl" />

<ng-template #promptTpl>
  <div class="flex flex-col items-center gap-5 py-2">
    <!-- Icon -->
    <div
      class="h-14 w-14 rounded-full flex items-center justify-center {{ iconBgClass() }}"
    >
      <ico [name]="icon()" size="md"></ico>
    </div>

    <!-- Title & Message -->
    <div class="text-center">
      <h3 class="text-base font-semibold title-font">{{ title() }}</h3>
      @if (message()) {
        <p class="text-sm text-secondary mt-1.5 leading-relaxed">{{ message() }}</p>
      }
    </div>

    <!-- Action buttons -->
    <div class="flex gap-3 w-full">
      <button
        type="button"
        class="flex-1 py-2.5 rounded-xl text-sm font-medium button-secondary"
        (click)="onCancel()"
      >
        {{ cancelText() }}
      </button>
      <button
        type="button"
        class="flex-1 py-2.5 rounded-xl text-sm font-medium {{ confirmButtonClass() }}"
        (click)="onConfirm()"
      >
        {{ confirmText() }}
      </button>
    </div>
  </div>
</ng-template>
