@if (shellLoaderVisible()) {
  <div
    id="fintrackr-app-boot"
    role="status"
    aria-live="polite"
    [attr.aria-label]="shellLoaderMessage()"
  >
    <div class="fintrackr-boot__inner">
      <div class="fintrackr-boot__mark" aria-hidden="true">
        <img
          src="web-app-manifest-192x192.png"
          alt=""
          width="72"
          height="72"
          decoding="async"
        />
      </div>
      <div>
        <p class="fintrackr-boot__title">LogMyMudra</p>
        <p class="fintrackr-boot__sub">{{ shellLoaderMessage() }}</p>
      </div>
      <div class="fintrackr-boot__spinner" aria-hidden="true"></div>
    </div>
  </div>
}

<div class="w-full flex justify-center h-dvh w-full items-center">
  <div class="max-w-150 w-full h-full">
    <router-outlet />
    <app-notifier />
  </div>
</div>

<!-- Biometric lock overlay -->
@if (biometricLock.locked()) {
  <div
    class="fixed inset-0 z-[9999] flex items-center justify-center bg-[var(--color-bg)] backdrop-blur-sm"
  >
    <div class="flex flex-col items-center gap-6 p-8 text-center max-w-xs">
      <div class="h-20 w-20 rounded-2xl bg-primary flex items-center justify-center">
        <ico name="fingerprint" size="xl" class="text-white"></ico>
      </div>
      <div class="flex flex-col gap-1">
        <h1 class="text-xl font-bold title-font">LogMyMudra</h1>
        <p class="text-sm text-secondary">Verify your identity to continue</p>
      </div>

      @if (unlockFailed()) {
        <p class="text-sm text-red-500">Authentication failed. Please try again.</p>
      }

      <button
        type="button"
        class="w-full button-primary rounded-xl py-3 flex items-center justify-center gap-2 disabled:opacity-60"
        [disabled]="unlocking()"
        (click)="triggerBiometric()"
      >
        @if (unlocking()) {
          <ico name="circle-notch-loader" size="sm" [spin]="true"></ico>
          <span>Verifying…</span>
        } @else {
          <ico name="fingerprint" size="sm"></ico>
          <span>Unlock with Biometric</span>
        }
      </button>
    </div>
  </div>
}
