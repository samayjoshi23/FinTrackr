<div class="gap-3 w-full flex flex-col h-full justify-center items-start p-4 md:p-5">
  <div class="flex gap-2">
    <img src="app-logo.png" alt="FinTrackr" class="h-7 w-7" />
    <h1
      class="text-[1.5rem] underline underline-offset-4 decoration-2 decoration-mauve-600 font-bold"
    >
      <span class="text-mauve-600">Fin</span>
      <span class="text-emerald-600">Trackr</span>
    </h1>
  </div>
  <div class="flex flex-col mb-6">
    <h1 class="text-2xl title-font font-medium">Create account</h1>
    <p class="text-sm text-secondary font-light">Start tracking your finances today</p>
  </div>
  <form [formGroup]="signupForm" class="gap-4 max-w-150 w-full flex flex-col">
    <!-- Full Name -->
    <div class="flex flex-col gap-1">
      <label for="fullName" class="text-xs text-gray-400">Full Name</label>
      <div class="field-wrapper before">
        <span class="field-icon before">
          <ico name="user" size="sm"></ico>
        </span>
        <input
          type="text"
          class="w-full"
          id="fullName"
          placeholder="Enter your name"
          formControlName="fullName"
        />
      </div>
    </div>

    <!-- Email -->
    <div class="flex flex-col gap-1">
      <label for="email" class="text-xs text-gray-400">Email</label>
      <div class="field-wrapper before">
        <span class="field-icon before">
          <ico name="envelope" size="sm"></ico>
        </span>
        <input
          type="email"
          class="w-full"
          placeholder="Enter your email"
          id="email"
          formControlName="email"
        />
      </div>
    </div>

    <!-- Password -->
    <div class="flex flex-col gap-1">
      <label for="password" class="text-xs text-gray-400">Password</label>
      <div class="field-wrapper before after">
        <span class="field-icon before">
          <ico name="lock" size="sm"></ico>
        </span>
        <input
          type="password"
          class="w-full"
          id="password"
          placeholder="Create a password"
          formControlName="password"
          #passwordInput
        />
        @if (passwordInput.type === 'password') {
          <span class="field-icon after cursor-pointer" (click)="passwordInput.type = 'text'">
            <ico name="eye-open" size="sm"></ico>
          </span>
        } @else {
          <span class="field-icon after cursor-pointer" (click)="passwordInput.type = 'password'">
            <ico name="eye-closed" size="sm"></ico>
          </span>
        }
      </div>
    </div>

    <!-- Confirm Password -->
    <div class="flex flex-col gap-1">
      <label for="confirmPassword" class="text-xs text-gray-400">Confirm Password</label>
      <div class="field-wrapper before after">
        <span class="field-icon before">
          <ico name="lock" size="sm"></ico>
        </span>
        <input
          type="password"
          class="w-full"
          id="confirmPassword"
          placeholder="Confirm your password"
          formControlName="confirmPassword"
          #confirmPasswordInput
        />
        @if (confirmPasswordInput.type === 'password') {
          <span
            class="field-icon after cursor-pointer"
            (click)="confirmPasswordInput.type = 'text'"
          >
            <ico name="eye-open" size="sm"></ico>
          </span>
        } @else {
          <span
            class="field-icon after cursor-pointer"
            (click)="confirmPasswordInput.type = 'password'"
          >
            <ico name="eye-closed" size="sm"></ico>
          </span>
        }
      </div>
    </div>

    <!-- Create account -->
    <button
      type="button"
      severity="primary"
      class="rounded-xl py-3 flex items-center justify-center gap-2 disabled:opacity-60"
      [disabled]="isSubmitting()"
      (click)="onSubmit()"
    >
      @if (isSubmitting()) {
        <ico name="circle-notch-loader" size="sm" [spin]="true"></ico>
        <span>Creating account…</span>
      } @else {
        <span>Create account</span>
        <ico name="right-arrow" size="sm"></ico>
      }
    </button>

    <!-- Additional options -->
    <div class="flex flex-col gap-3 items-center justify-center">
      <p class="text-sm text-gray-400">or continue with</p>
      <button
        type="button"
        class="overflow-hidden rounded-full cursor-pointer"
        [disabled]="isSubmitting()"
        (click)="onGoogleSignup()"
      >
        <img src="assets/login-providers/google.png" alt="Google" class="h-7 w-7" />
      </button>

      <p class="text-sm text-gray-500">
        Already have an account?
        <a routerLink="/login" class="no-underline">Sign in</a>
      </p>
    </div>
  </form>
</div>
