<div class="notif-list-page flex flex-col h-full min-h-dvh overflow-hidden p-4 md:p-5 gap-4">
  <header class="flex items-center gap-2 shrink-0">
    <div class="flex items-center gap-2 justify-between w-full">
      <div class="flex items-center gap-2">
        <div
          class="h-9 w-9 flex justify-center items-center rounded-full button-secondary cursor-pointer"
          (click)="onBack()"
        >
          <ico name="left-arrow" size="sm"></ico>
        </div>
        <div class="flex items-center gap-2 flex-wrap">
          <h1 class="text-xl font-semibold title-font">Notifications</h1>
          @if (unreadCount() > 0) {
            <span
              class="inline-flex items-center justify-center min-w-[1.25rem] h-5 px-1.5 rounded-full bg-primary text-[var(--color-bg-elevated)] text-xs font-semibold title-font"
            >
              {{ unreadCount() }}
            </span>
          }
        </div>
      </div>
      <div class="flex items-center gap-1 shrink-0">
        @if (unreadCount() > 0) {
          <a
            class="mark-all-read flex items-center gap-1.5 text-xs font-medium text-primary px-2 py-1.5 rounded-lg"
            (click)="markAllRead()"
          >
            <ico name="tick" size="xs"></ico>
            Mark all read
          </a>
        }
      </div>
    </div>
  </header>

  <div class="flex-1 overflow-y-auto pb-20 space-y-3">
    @for (n of items(); track n.id) {
      <div
        class="notif-card w-full text-left card rounded-2xl p-3 flex gap-3 relative"
        (click)="markRead(n.id)"
      >
        <div
          class="notif-card__icon h-10 w-10 rounded-lg flex items-center justify-center shrink-0"
          [ngClass]="toneClass(n.type)"
        >
          <ico [name]="iconFor(n.type)" size="md"></ico>
        </div>
        <div class="min-w-0 flex-1 flex flex-col gap-1">
          <p class="text-sm font-semibold title-font">{{ n.title }}</p>
          <p class="text-xs text-secondary font-light">{{ n.message }}</p>
          <p class="text-[0.6rem] text-secondary font-light pt-0.5">
            {{ relativeTime(n.at) }}
          </p>
        </div>
        @if (!n.read) {
          <span
            class="absolute top-3 right-3 h-2 w-2 rounded-full bg-primary shrink-0"
            aria-hidden="true"
          ></span>
        }
      </div>
    }
  </div>
</div>
