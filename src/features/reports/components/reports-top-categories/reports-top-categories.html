<div class="flex flex-col gap-3">
  <p class="text-sm title-font font-semibold">Top Spending Categories</p>
  @if (categories.length === 0) {
    <div class="card rounded-2xl p-4">
      <p class="text-sm text-secondary text-center">No expense data for this period</p>
    </div>
  } @else {
    <div class="flex flex-col gap-2">
      @for (cat of categories; track $index) {
        <div class="card rounded-2xl p-4 flex items-center justify-between">
          <div class="flex items-center gap-3">
            <div
              class="h-9 w-9 rounded-full flex items-center justify-center"
              [style.background-color]="cat.color + '33'"
            >
              <ico [name]="cat.icon" size="sm" [style.color]="cat.color"></ico>
            </div>
            <p class="text-sm font-medium title-font">{{ cat.category }}</p>
          </div>
          <p class="text-sm font-semibold title-font">
            {{ cat.amount | currency: currency : 'symbol-narrow' : '1.0-0' }}
          </p>
        </div>
      }
    </div>
  }
</div>
