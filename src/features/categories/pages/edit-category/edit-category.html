<div class="w-full h-full flex flex-col p-4 md:p-5 gap-4 overflow-y-auto pb-15">
  <header class="flex items-center gap-2">
    <div
      class="h-9 w-9 rounded-full button-secondary cursor-pointer flex items-center justify-center"
      (click)="onBack()"
    >
      <ico name="left-arrow" size="sm"></ico>
    </div>
    <h1 class="text-xl font-semibold title-font">Edit category</h1>
  </header>

  @if (loading()) {
    <p class="text-sm text-secondary font-light">Loading…</p>
  } @else {
    <form class="flex flex-col gap-4">
      <div class="flex flex-col gap-2">
        <label for="editCategoryName" class="text-xs text-gray-400">Name</label>
        <div class="field-wrapper before">
          <span class="field-icon before">
            <ico name="tags" size="sm"></ico>
          </span>
          <input
            type="text"
            id="editCategoryName"
            name="editCategoryName"
            class="w-full"
            [(ngModel)]="categoryName"
          />
        </div>
      </div>

      <div class="flex flex-col gap-2">
        <label for="editCategoryDescription" class="text-xs text-gray-400"
          >Description (optional)</label
        >
        <div class="field-wrapper before">
          <span class="field-icon before">
            <ico name="pencil" size="sm"></ico>
          </span>
          <input
            type="text"
            id="editCategoryDescription"
            name="editCategoryDescription"
            class="w-full"
            [(ngModel)]="description"
          />
        </div>
      </div>

      <div class="flex flex-col gap-2">
        <label class="text-xs text-gray-400">Icon</label>
        <div class="flex flex-wrap gap-2">
          @for (iconId of displayIcons(); track iconId) {
            <button
              type="button"
              class="card rounded-xl p-2 flex items-center justify-center min-h-[2.75rem] min-w-[2.75rem]"
              [ngClass]="{ 'selected-card': selectedIcon === iconId }"
              (click)="selectedIcon = iconId"
              [attr.aria-pressed]="selectedIcon === iconId"
              [attr.aria-label]="'Icon ' + iconId"
            >
              <ico
                [name]="iconId"
                size="sm"
                [class.text-primary]="selectedIcon === iconId"
                [class.text-secondary]="selectedIcon !== iconId"
              ></ico>
            </button>
          }
        </div>
      </div>

      <div class="flex flex-col gap-2 mt-2">
        <button
          type="button"
          class="button-primary rounded-xl py-3 w-full flex items-center justify-center gap-2"
          (click)="onSave()"
        >
          <span>Save changes</span>
          <ico name="right-arrow" size="sm"></ico>
        </button>
      </div>
    </form>
  }
</div>
