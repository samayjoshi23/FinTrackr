<div class="w-full h-full flex flex-col p-4 md:p-5 gap-4 overflow-y-auto pb-15">
  <div class="flex items-center justify-between">
    <h1 class="text-2xl font-semibold title-font">Categories</h1>
    <div
      class="h-9 w-9 rounded-full flex items-center justify-center cursor-pointer bg-primary-light text-primary"
      (click)="onNew()"
      aria-label="New category"
    >
      <ico name="plus" size="md"></ico>
    </div>
  </div>

  @if (categories().length === 0) {
    <div class="card rounded-2xl p-4 flex flex-col gap-2">
      <p class="text-sm text-secondary">No categories yet</p>
      <button type="button" class="button-primary rounded-xl py-2" (click)="onNew()">
        Create your first category
      </button>
    </div>
  } @else {
    <div class="flex flex-col gap-3">
      @for (c of categories(); track c.uid) {
        <div class="card rounded-xl p-4 flex items-center gap-3 w-full text-left border-0">
          <!-- Icon -->
          <div
            class="h-11 w-11 rounded-xl bg-primary-light flex items-center justify-center shrink-0"
          >
            <ico [name]="c.icon" size="md" class="text-primary"></ico>
          </div>

          <!-- Name & description -->
          <div class="flex flex-col gap-0.5 min-w-0 flex-1">
            <p class="text-sm font-semibold title-font truncate">{{ c.name }}</p>
            @if (c.description) {
              <p class="text-xs text-secondary font-light line-clamp-2">{{ c.description }}</p>
            }
          </div>

          <!-- Action buttons -->
          <div class="flex items-center gap-2 shrink-0">
            <button
              type="button"
              title="Edit category"
              class="h-8 w-8 rounded-lg flex items-center justify-center text-secondary button-yellow"
              (click)="$event.stopPropagation(); onEdit(c)"
            >
              <ico name="pencil" size="sm"></ico>
            </button>
            <button
              type="button"
              title="Delete category"
              class="h-8 w-8 rounded-lg flex items-center justify-center text-secondary button-red"
              [disabled]="deleting()"
              (click)="onDeleteRequest($event, c)"
            >
              <ico name="trash" size="sm"></ico>
            </button>
          </div>
        </div>
      }
    </div>
  }
</div>

<!-- Delete confirmation -->
<app-confirm-prompt
  [(open)]="deletePromptOpen"
  title="Delete category?"
  [message]="
    'Delete \'' +
    (deletingCategory()?.name ?? '') +
    '\'? Existing transactions will keep their category label, but the category entry will be removed.'
  "
  icon="trash"
  confirmText="Delete"
  cancelText="Cancel"
  severity="danger"
  (confirmed)="onDeleteConfirmed($event)"
/>
